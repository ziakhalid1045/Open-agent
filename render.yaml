# Render.com deployment config
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: open-agents
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: OPEN_AGENTS_AI_PROVIDER
        value: openai
      - key: OPEN_AGENTS_AI_MODEL
        value: gpt-4o
      - key: OPEN_AGENTS_HEADLESS
        value: "true"
      - key: OPEN_AGENTS_DATABASE_URL
        value: sqlite+aiosqlite:///./data/open_agents.db
      - key: OPEN_AGENTS_WORKSPACE_ROOT
        value: /app/data/workspaces
    disk:
      name: agent-data
      mountPath: /app/data
      sizeGB: 1
    healthCheckPath: /health
